<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Anson Chung</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap"
		/>
		<link rel="stylesheet" href="colours.css" />
		<link rel="stylesheet" href="style.css" />
	</head>

	<body>

			<h1>Hi, I am Anson :)</h1>

		<div class="layout">
			<nav class="sidebar">
				<div class="nav-group">
					<button data-target="about">About Me</button>

						<button data-target="contact">Contact</button>
					</div>
				</div>
				<button data-target="why-switch">Why do I want a switch</button>

				<section id="contact">

				<section id="portfolio"></section>

				<section id="snake">
					<div class="section-text"></div>
				</section>

				<section id="route-calculator">
					<div class="section-text"></div>

					<div class="section-text"></div>
				</section>

		<script src="content.js"></script>
		<script src="script.js"></script>
